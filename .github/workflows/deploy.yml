name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Validate built HTML
        run: npx --yes html-validate "dist/**/*.html"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build-and-check
    runs-on: [self-hosted, hestia-p30]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Sync to public_html
        run: |
          rsync -a --delete dist/ /home/andriantokar/web/beton-zakarpattya.com.ua/public_html/
